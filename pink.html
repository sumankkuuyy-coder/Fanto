<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIEWER</title>
    <style>
        /* Black & White Minimalist */
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: monospace; 
            margin: 0; 
            padding: 10px;
        }

        #logs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Minimal Card */
        .card {
            background: #000;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 0;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Subtle Time Header */
        .time {
            color: #444;
            font-size: 10px;
            margin-bottom: 8px;
            border-bottom: 1px solid #111;
            padding-bottom: 4px;
        }

        /* Data List */
        .data-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Raw Data Only - No Labels */
        .val {
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            word-break: break-all;
        }

        .status {
            text-align: center;
            font-size: 9px;
            color: #222;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="status">Live Stream • IST</div>
    <div id="logs"></div>

    <script>
        // Naya Worker URL updated
        const API_URL = "https://empty-frost-a432.sumankkuuyy.workers.dev/get-data";

        async function refresh() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const container = document.getElementById('logs');
                
                container.innerHTML = data.map(item => {
                    let fields = {};
                    try { 
                        fields = JSON.parse(item.content); 
                    } catch(e) { 
                        fields = { raw: item.content }; 
                    }

                    // Sirf values dikhayega (Keys/Labels hata diye hain)
                    const valuesHtml = Object.values(fields)
                        .map(v => `<div class="val">${v}</div>`)
                        .join('');

                    return `
                        <div class="card">
                            <div class="time">${item.timestamp}</div>
                            <div class="data-list">
                                ${valuesHtml}
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch(e) {
                // Silently try again
            }
        }

        // 2 Second Refresh Cycle
        setInterval(refresh, 2000);
        refresh();
    </script>
</body>
</html>
