<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MONITOR</title>
    <style>
        body { 
            background-color: #ffffff; 
            color: #000000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Minimal Header Section */
        .header {
            text-align: center;
            padding: 10px 0 8px 0;
            border-bottom: 1px solid #f5f5f5;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 14px; 
            font-weight: 700;
            letter-spacing: 1px;
            color: #000;
        }

        .header p {
            margin: 1px 0 0 0;
            font-size: 10px;
            color: #ff0000;
            font-weight: 500;
        }

        #logs {
            display: flex;
            flex-direction: column;
        }

        .card {
            background: #ffffff;
            margin-bottom: 2px; /* Gap kam kiya */
            display: flex;
            flex-direction: column;
        }

        /* 5% Black Transparent Time Box - More Compact */
        .time-box {
            background-color: rgba(0, 0, 0, 0.05);
            color: #888;
            font-size: 9px;
            padding: 3px 12px;
            font-family: monospace;
        }

        .data-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 6px 12px;
            border-bottom: 1px solid #fafafa;
        }

        /* Data font thoda chota kiya readability ke liye */
        .val {
            color: #000;
            font-size: 15px; 
            font-weight: 700;
            word-break: break-all;
            line-height: 1.2;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>LIVE</h1>
        <p>Show data here</p>
    </div>

    <div id="logs"></div>

    <script>
        const API_URL = "https://empty-frost-a432.sumankkuuyy.workers.dev/get-data";

        async function update() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const container = document.getElementById('logs');
                
                container.innerHTML = data.map(item => {
                    let fields = {};
                    try { fields = JSON.parse(item.content); } catch(e) { fields = { raw: item.content }; }

                    const valuesHtml = Object.values(fields)
                        .map(v => `<div class="val">${v}</div>`)
                        .join('');

                    return `
                        <div class="card">
                            <div class="time-box">${item.timestamp}</div>
                            <div class="data-list">
                                ${valuesHtml}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch(e) {}
        }

        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
